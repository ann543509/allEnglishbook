  <style>

    body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
    .font-serif-en { font-family: 'Merriweather', serif; }
    
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
      100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }
    .animate-pulse-ring { animation: pulse-ring 1.5s infinite; }
    
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin-slow 2s linear infinite; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    .blind-mode-blur { filter: blur(6px); user-select: none; transition: filter 0.3s ease; cursor: help; }
    .blind-mode-blur:hover { filter: blur(0px); }
    
    .word-correct { color: #16a34a; font-weight: bold; }
    .word-missed { color: #dc2626; text-decoration: line-through; opacity: 0.6; }
    
    .cia-variable-btn { transition: all 0.2s ease; }
    .cia-variable-btn:active { transform: scale(0.95); }
    
    .wave-bar { width: 4px; height: 12px; background-color: white; border-radius: 2px; animation: wave 1s ease-in-out infinite; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    @keyframes wave { 0%, 100% { height: 6px; } 50% { height: 14px; } }
  </style>

          { id: "s1-12", text: "This position can be <span class='highlight-kw'>demanding</span> and <span class='highlight-kw'>stressful</span>.", plain: "This position can be demanding and stressful.", mean: "這個職位要求高，壓力大。", tip: "加強 demanding 和 stressful 的語氣。" },

        sentences: [
          { id: "s5-1", text: "Hi, Janet, are you <span class='highlight-kw'>done with</span> the invitation letters to the keynote speakers?", plain: "Hi, Janet, are you done with the invitation letters to the keynote speakers?", mean: "嗨 Janet，給主講人的邀請函妳完成了嗎？", tip: "done with 的 n 和 w 可以連得快一點。" },
          { id: "s5-2", text: "Yes, almost. I'm not sure whether I've included sufficient information about our <span class='highlight-kw'>reimbursement policy</span>.", plain: "Yes, almost. I'm not sure whether I've included sufficient information about our reimbursement policy.", mean: "是的，快好了。我不確定我是否提供了關於我們核銷政策的充足資訊。", tip: "whether I've 可以連音唸成 [wɛðɚ-raɪv]。" },
          { id: "s5-3", text: "It's very important to inform our keynote speakers that they will be <span class='highlight-kw'>reimbursed for</span> the <span class='highlight-kw'>actual costs</span> of travel and subsistence expenditures.", plain: "It's very important to inform our keynote speakers that they will be reimbursed for the actual costs of travel and subsistence expenditures.", mean: "告知我們的主講人他們將獲得差旅費和日常開支的實報實銷，這非常重要。", tip: "reimbursed for 的 [d] 和 [f] 不好接，[d] 可以輕輕帶過。" },
          { id: "s5-4", text: "Actual costs of travel? Seriously? You mean they can fly <span class='highlight-kw'>business class</span>?", plain: "Actual costs of travel? Seriously? You mean they can fly business class?", mean: "差旅費實報實銷？真的嗎？妳是說他們可以搭商務艙？", tip: "Seriously 語調上揚表示驚訝。" },
          { id: "s5-5", text: "Oops. Nice one. We only <span class='highlight-kw'>pay for</span> the <span class='highlight-kw'>economy class</span>.", plain: "Oops. Nice one. We only pay for the economy class.", mean: "噢，想得美。我們只支付經濟艙的費用。", tip: "Nice one 是諷刺語氣，要唸得俏皮一點。" },
          { id: "s5-6", text: "Please <span class='highlight-kw'>make sure</span> that our keynote speakers are <span class='highlight-kw'>aware of</span> this before they book their flight.", plain: "Please make sure that our keynote speakers are aware of this before they book their flight.", mean: "請確保我們的主講人在訂機票前知道這一點。", tip: "aware of 必連音 [əˋwɛr-əv]。" },
          { id: "s5-7", text: "I see. Oh, by the way, Dr. Lin, one of the keynote speakers from Sweden mentioned that his wife will travel with him.", plain: "I see. Oh, by the way, Dr. Lin, one of the keynote speakers from Sweden mentioned that his wife will travel with him.", mean: "我明白了。噢對了，來自瑞典的主講人之一林博士提到他太太會隨行。", tip: "one of 連音 [wʌn-əv]。" },
          { id: "s5-8", text: "She's never been to Asia before. <span class='highlight-kw'>What about</span> her flight ticket cost?", plain: "She's never been to Asia before. What about her flight ticket cost?", mean: "她以前從沒去過亞洲。那她的機票費用呢？", tip: "What about 是超級常用的連音 [hwɑ-tə-baʊt]。" },
          { id: "s5-9", text: "We won't be able to reimburse any expenses <span class='highlight-kw'>incurred by</span> spouses or other family members who accompany our keynote speakers on their travels.", plain: "We won't be able to reimburse any expenses incurred by spouses or other family members who accompany our keynote speakers on their travels.", mean: "我們無法核銷任何由配偶或其他隨行家人產生的費用。", tip: "建議斷句：expenses | incurred by spouses | or other family members。" },
          { id: "s5-10", text: "All right. I will tell Dr. Lin that he needs to <span class='highlight-kw'>take care of</span> his wife's travel expenses <span class='highlight-kw'>on his own</span>.", plain: "All right. I will tell Dr. Lin that he needs to take care of his wife's travel expenses on his own.", mean: "好的。我會告訴林博士他需要自行負擔他太太的旅費。", tip: "take care of 連音 [tek-kɛr-əv]。" },
          { id: "s5-11", text: "However, Dr. Lin doesn't need to pay any <span class='highlight-kw'>extra cost</span> for the accommodation.", plain: "However, Dr. Lin doesn't need to pay any extra cost for the accommodation.", mean: "不過，林博士不需要為住宿支付任何額外費用。", tip: "Accommodation 慢慢唸準確。" },
          { id: "s5-12", text: "What about the high-speed rail ticket cost? Also the economy class?", plain: "What about the high-speed rail ticket cost? Also the economy class?", mean: "那高鐵車票的費用呢？也是經濟艙嗎？", tip: "Rail 結尾的 [l] 聲音要拉長一點點。" },
          { id: "s5-13", text: "Oh, <span class='highlight-kw'>when it comes to</span> HSR, it's a different story.", plain: "Oh, when it comes to HSR, it's a different story.", mean: "噢，說到高鐵，那又是另一回事了。", tip: "when it comes to 連音唸 [wɛn-ɪt-kʌmz-tu]。" },
          { id: "s5-14", text: "Please inform them that the daily allowance is <span class='highlight-kw'>no more than</span> NT$ 1500.", plain: "Please inform them that the daily allowance is no more than NT$ 1500.", mean: "請告知他們每日生活津貼不超過台幣 1500 元。", tip: "1500 唸 fifteen hundred 比較順口。" },
          { id: "s5-15", text: "O.K. <span class='highlight-kw'>Last but not least</span>. Do they need to submit the original receipts for reimbursement?", plain: "O.K. Last but not least. Do they need to submit the original receipts for reimbursement?", mean: "好的。最後一點。他們需要繳交原始收據來核銷嗎？", tip: "Last but not least (最後但同樣重要)。" }

          { id: "s6-5", text: "There was a <span class='highlight-kw'>terrorist</span> attack on <span class='highlight-kw'>Stockholm</span> yesterday.", plain: "There was a terrorist attack on Stockholm yesterday.", mean: "昨天斯德哥爾摩發生了恐怖攻擊。", tip: "Stockholm 注意 [st] 不送氣。" },
          { id: "s6-6", text: "<span class='highlight-kw'>Stockholm</span>? Isn't it in Northern Europe? What does it have to do with us?", plain: "Stockholm? Isn't it in Northern Europe? What does it have to do with us?", mean: "斯德哥爾摩？那不是在北歐嗎？這跟我們有什麼關係？", tip: "What does it 唸快時，t 會變成輕彈音。" },
          { id: "s6-7", text: "Remember one of our keynote speakers, Dr. Lin, is flying to Taiwan from Sweden?", plain: "Remember one of our keynote speakers, Dr. Lin, is flying to Taiwan from Sweden?", mean: "記得我們的主講人之一林博士，正要從瑞典飛來台灣嗎？", tip: "one of 連音 [wʌn-əv]。" },
          { id: "s6-8", text: "I am afraid not. He and his wife were doing some shopping for this business trip to Asia when the <span class='highlight-kw'>hijacked</span> truck drove into the department store.", plain: "I am afraid not. He and his wife were doing some shopping for this business trip to Asia when the hijacked truck drove into the department store.", mean: "恐怕不太好。當那輛被劫持的卡車衝進百貨公司時，他和太太正為了這趟亞洲出差在購物。", tip: "hijacked truck 的 [t] 接 [t]，只發一次強音 [t]。" },
          { id: "s6-9", text: "Five people were killed including one <span class='highlight-kw'>British</span> man and a <span class='highlight-kw'>Belgian</span> woman.", plain: "Five people were killed including one British man and a Belgian woman.", mean: "五人遇害，其中包括一名英國男子和一名比利時婦女。", tip: "British man 注意 [ʃ] 接 [m] 的嘴型轉換。" },
          { id: "s6-10", text: "Oh, my goodness. They must have been <span class='highlight-kw'>terrified</span>. How are they now?", plain: "Oh, my goodness. They must have been terrified. How are they now?", mean: "噢，我的天啊。他們一定嚇壞了。他們現在還好嗎？", tip: "must have 口語常縮讀為 [mʌst-əv]。" },
          { id: "s6-11", text: "I guess they are still <span class='highlight-kw'>struggling</span> to <span class='highlight-kw'>cope with</span> this <span class='highlight-kw'>traumatic</span> event.", plain: "I guess they are still struggling to cope with this traumatic event.", mean: "我想他們仍在努力平復這一創傷事件。", tip: "struggling 的 [str] 不送氣。" },
          { id: "s6-12", text: "Can you find someone to <span class='highlight-kw'>replace</span> him at such <span class='highlight-kw'>short notice</span>?", plain: "Can you find someone to replace him at such short notice?", mean: "妳能在這麼短的時間內找人接替他嗎？", tip: "short notice 的 [t] 接 [n] 變成鼻腔爆破。" },
          { id: "s6-13", text: "Well...let me see. A couple of names have just <span class='highlight-kw'>crossed my mind</span>.", plain: "Well...let me see. A couple of names have just crossed my mind.", mean: "嗯...讓我想想。我剛想到幾個人名。", tip: "crossed my 的 ed [t] 接 [m] 變得很輕。" },
          { id: "s6-14", text: "I totally understand your <span class='highlight-kw'>frustration</span> and concern. Thank you so much. I <span class='highlight-kw'>owe</span> you one.", plain: "I totally understand your frustration and concern. Thank you so much. I owe you one.", mean: "我完全理解妳的挫折與擔憂。非常感謝，我欠你一個人情。", tip: "owe you 連音 [o-ju]。" }

        ],
        sentences: [
          { id: "s7-1", text: "I'm calling to <span class='highlight-kw'>confirm</span> the <span class='highlight-kw'>arrangements</span> for the accommodations.", plain: "I'm calling to confirm the arrangements for the accommodations.", mean: "我打來確認住宿的安排。", tip: "calling to 的 g 省略。confirm 的 m 閉嘴。" },
          { id: "s7-2", text: "You booked five double rooms and one <span class='highlight-kw'>connecting room</span>, right?", plain: "You booked five double rooms and one connecting room, right?", mean: "您預訂了五間雙人房和一間連通房，對嗎？", tip: "connecting room 的 g 不發音。" },
          { id: "s7-3", text: "Do you have any <span class='highlight-kw'>special requests</span> for the dinner party?", plain: "Do you have any special requests for the dinner party?", mean: "晚餐派對有什麼特別的要求嗎？", tip: "requests 結尾 sts 氣音要輕。" },
          { id: "s7-4", text: "Make sure that your <span class='highlight-kw'>chef</span> can prepare a <span class='highlight-kw'>variety of</span> dishes for different <span class='highlight-kw'>religious needs</span>.", plain: "Make sure that your chef can prepare a variety of dishes for different religious needs.", mean: "請確保您的廚師可以因應不同宗教需求來烹調各種料理。", tip: "variety of 連音 [vəˋraɪətɪ-jəv]。" },
          { id: "s7-5", text: "Some clients are <span class='highlight-kw'>strict</span> Buddhist <span class='highlight-kw'>vegetarians</span> who can't have eggs, <span class='highlight-kw'>garlic</span>, or <span class='highlight-kw'>leeks</span>.", plain: "Some clients are strict Buddhist vegetarians who can't have eggs, garlic, or leeks.", mean: "有些客戶是嚴謹的佛教徒，不吃蛋、蒜或韭菜。", tip: "garlic, leeks 注意標點停頓。" },
          { id: "s7-6", text: "Any other religious needs that we have to <span class='highlight-kw'>attend to</span>?", plain: "Any other religious needs that we have to attend to?", mean: "還有其他我們需要注意的宗教需求嗎？", tip: "attend to 的 d 省略。" },
          { id: "s7-7", text: "Five of our guests are <span class='highlight-kw'>Malays</span> who keep <span class='highlight-kw'>strict</span> <span class='highlight-kw'>Islamic</span> dietary laws.", plain: "Five of our guests are Malays who keep strict Islamic dietary laws.", mean: "有五位客人是馬來人，遵守嚴格的伊斯蘭飲食律法。", tip: "Islamic 注意 [m] 的閉嘴。" },
          { id: "s7-8", text: "Do not serve anything containing <span class='highlight-kw'>pork</span>, <span class='highlight-kw'>blood</span>, or <span class='highlight-kw'>wine</span>.", plain: "Do not serve anything containing pork, blood, or wine.", mean: "不要提供任何含有豬肉、血或酒的餐點。", tip: "blood 母音是 [ʌ]。wine 結尾 n 不要閉嘴。" },
          { id: "s7-9", text: "<span class='highlight-kw'>How about</span> some curry <span class='highlight-kw'>Laksa</span>? You <span class='highlight-kw'>can't go wrong with</span> it.", plain: "How about some curry Laksa? You can't go wrong with it.", mean: "來點咖哩叻沙如何？選它絕對不會錯。", tip: "how about 連音。Laksa 兩個 a 都要張大口。" },

        sentences: [

      { id: "p4", phrase: "apply for", sentence: "I want to <span class='highlight-kw'>apply for</span> this position.", plain: "I want to apply for this position.", mean: "申請", tip: "apply y 接 for 連貫。" },
      { id: "p-u5-1", phrase: "done with", sentence: "Are you <span class='highlight-kw'>done with</span> the letter?", plain: "Are you done with the letter?", mean: "完成...", tip: "done n 接 with。" },
      { id: "p-u5-2", phrase: "reimbursed for", sentence: "Be <span class='highlight-kw'>reimbursed for</span> actual costs.", plain: "Be reimbursed for actual costs.", mean: "核銷...費用", tip: "d 接 f 輕讀。" },
      { id: "p-u6-1", phrase: "have a minute", sentence: "Do you <span class='highlight-kw'>have a minute</span>?", plain: "Do you have a minute?", mean: "有空嗎", tip: "have v 接 a。" },
      { id: "p-u6-2", phrase: "middle of", sentence: "I'm in the <span class='highlight-kw'>middle of</span> something.", plain: "I'm in the middle of something.", mean: "正忙於...", tip: "middle l 接 of。" },
      { id: "p-u7-1", phrase: "variety of", sentence: "Prepare a <span class='highlight-kw'>variety of</span> dishes.", plain: "Prepare a variety of dishes.", mean: "各式各樣的", tip: "variety 接 of 連音。" },
      { id: "p-u7-2", phrase: "attend to", sentence: "Needs that we have to <span class='highlight-kw'>attend to</span>.", plain: "Needs that we have to attend to.", mean: "照料/處理", tip: "attend d 省略接 to。" },
      { id: "L8-p1", unitId: "Unit 8", phrase: "look forward to", plain: "I look forward to it.", sentence: "I <span class='highlight-kw'>look forward to</span> it.", mean: "期待 (接名詞/Ving)", tip: "to 弱讀為 [tə]，連音順暢。" },

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, Fragment } = React;
    const { createPortal } = ReactDOM;

    let globalRecognition = null;
    let globalTimeout = null;

    const getSharedRecognition = () => {
      if (!globalRecognition) {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRec) {
          globalRecognition = new SpeechRec();
          globalRecognition.lang = 'en-US';
          globalRecognition.interimResults = false;
          globalRecognition.maxAlternatives = 1;
          globalRecognition.continuous = false;
        }
      }
      return globalRecognition;
    };

    const Icon = ({ children, className, ...p }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...p}>{children}</svg>;
    const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
    const MessageCircle = (p) => <Icon {...p}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></Icon>;
    const Target = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Icon>;
    const Volume2 = (p) => <Icon {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></Icon>;
    const Crosshair = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="22" x2="18" y1="12" y2="12"/><line x1="6" x2="2" y1="12" y2="12"/><line x1="12" x2="12" y1="6" y2="2"/><line x1="12" x2="12" y1="22" y2="18"/></Icon>;
    const Mic = (p) => <Icon {...p}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></Icon>;
    const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
    const Zap = (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
    const Play = (p) => <Icon {...p}><polygon points="5 3 19 12 5 21 5 3"/></Icon>;
    const Lightbulb = (p) => <Icon {...p}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-1 1.5-2 1.5-3.5 0-3-2.5-5.5-5.5-5.5S7 5 7 8c0 1.5.5 2.5 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></Icon>;
    const X = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 18 18"/></Icon>;
    const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Icon>;
    const Filter = (p) => <Icon {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></Icon>;
    const Link2 = (p) => <Icon {...p}><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" x2="16" y1="12" y2="12"/></Icon>;
    const Eye = (p) => <Icon {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const EyeOff = (p) => <Icon {...p}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></Icon>;
    const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
    const Turtle = (p) => <Icon {...p}><path d="m19 12-1.5 3"/><path d="M16.5 10.5 19 8"/><path d="m7 16 1.5 3"/><path d="M7.5 10.5 5 8"/><path d="M12 21a6 6 0 0 0 6-6v-2a6 6 0 0 0-6-6 6 6 0 0 0-6 6v2a6 6 0 0 0 6 6Z"/><path d="M12 21V9"/><path d="M12 21a4 4 0 0 1-4-4H6"/><path d="M12 21a4 4 0 0 0 4-4h2"/></Icon>;
    const Loader2 = (p) => <Icon {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;

    const speakText = (t, r = 0.85, c = null) => {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(t);
      u.lang = 'en-US'; u.rate = r;
      if (c) u.onend = (e) => c(e);
      window.speechSynthesis.speak(u);
    };

    const cleanText = (t) => t ? t.replace(/<[^>]*>/g, '').replace(/[.,\/#!$%\^&\*;:{}=\-_`~?]/g, "").replace(/\s{2,}/g, " ").trim().toLowerCase() : "";

    // ★ 智慧聽覺定錨引擎 (Smart Audio Anchor) ★
    const SmartTip = ({ text }) => {
      if (!text) return null;
      // 1. 確保底線清除，轉為空格
      const cleanedText = text.replace(/_/g, ' ');
      
      // 2. 正則掃描器：避開中括號(如音標 [aʊ])，精準抓取所有英文字與片語
      const regex = /(\[[^\]]+\])|([a-zA-Z][a-zA-Z '-]*[a-zA-Z]|[a-zA-Z])/g;
      const parts = cleanedText.split(regex);
      
      const handlePlay = (e, word) => {
         e.stopPropagation();
         // 刻意放慢速度至 0.75，讓耳朵精準捕捉連音細節
         speakText(word, 0.75); 
      };

      return (
         <span className="leading-relaxed">
           {parts.map((part, index) => {
             if (!part) return null;
             // 如果是音標括號，直接顯示文字
             if (part.startsWith('[') && part.endsWith(']')) {
                return <span key={index} className="text-red-500 font-mono mx-0.5">{part}</span>;
             }
             // 如果是抓取到的英文單字或片語，變成專屬播放按鈕
             if (/^[a-zA-Z][a-zA-Z '-]*[a-zA-Z]$|^[a-zA-Z]$/.test(part)) {
                return (
                   <button key={index} onClick={(e) => handlePlay(e, part)} className="inline-flex items-center justify-center bg-indigo-50 text-indigo-600 border border-indigo-200 rounded px-1.5 py-0.5 mx-0.5 font-bold hover:bg-indigo-100 hover:scale-105 transition-all shadow-sm active:scale-95 leading-none align-middle" title={`點擊聆聽慢速發音: ${part}`}>
                      <Volume2 className="w-3 h-3 mr-1 text-indigo-500" /> {part}
                   </button>
                );
             }
             // 其他中文解說維持原樣
             return <span key={index}>{part}</span>;
           })}
         </span>
      );
    };

    const InteractiveSentence = ({ htmlContent, isBlindMode }) => {
      const regex = /(<span class='[^']+'>.*?<\/span>)|([^<]+)/g;
      const parts = htmlContent.match(regex) || [];
      const handleClick = (e, w) => { e.stopPropagation(); speakText(w.replace(/[.,?!:;|]/g, ''), 0.75); };
      
      return (
        <span className={`leading-relaxed transition-all duration-500 ${isBlindMode ? 'blind-mode-blur' : ''}`}>
          {parts.map((p, i) => {
            if (p.startsWith('<span')) {
              const cm = p.match(/class='([^']+)'/); const cn = cm ? cm[1] : '';
              const c = p.match(/>(.*?)<\//)[1];
              return (
                <span key={i} className={`${cn} text-indigo-600 font-bold border-b-2 border-indigo-200`}>
                  {c.split(' ').map((w, wi) => (
                    <Fragment key={wi}><span onClick={(e) => handleClick(e, w)} className="cursor-pointer hover:bg-indigo-100 rounded px-0.5">{w}</span>{wi < c.split(' ').length - 1 && ' '}</Fragment>
                  ))}
                </span>
              );
            } else {
              return (
                <span key={i}>
                  {p.split(' ').map((w, wi) => (
                    <Fragment key={wi}><span onClick={(e) => handleClick(e, w)} className="cursor-pointer hover:bg-yellow-200 rounded px-0.5">{w}</span>{wi < p.split(' ').length - 1 && ' '}</Fragment>
                  ))}
                </span>
              );
            }
          })}
        </span>
      );
    };

    const RenderComparison = ({ feedback }) => {
      if (!feedback || !feedback.spokenText) return null;
      const tw = cleanText(feedback.targetText).split(' ');
      const sw = cleanText(feedback.spokenText).split(' ');
      return (
        <div className="mt-2 text-sm bg-white p-3 rounded border border-gray-200 shadow-inner">
          {feedback.advice && (
            <div className="mb-2 pb-2 border-b border-gray-100 bg-yellow-50 p-2 rounded">
              <div className="text-yellow-700 text-xs font-bold mb-1 flex items-center">
                <Lightbulb className="w-3 h-3 mr-1"/>教練的發音診斷：
              </div>
              <div className="text-gray-700 text-sm font-medium">{feedback.advice}</div>
            </div>
          )}
          <div className="mb-1 text-gray-500 text-xs">辨識結果比對 (嚴格模式)：</div>
          <div className="mb-2">
            {tw.map((w, i) => {
              const m = sw.some(x => x === w || (x.length > 3 && (x.includes(w) || w.includes(x))));
              return <span key={i} className={`mr-1 ${m ? 'word-correct' : 'word-missed'}`}>{w}</span>;
            })}
          </div>
          <div className="mt-1 text-xs text-gray-400">(我聽到: <span className="text-gray-600 italic">{feedback.spokenText}</span>)</div>
        </div>
      );
    };

    const MobileFeedbackToast = ({ feedback, showDetails, toggleDetails, onClose }) => {
      if (!feedback) return null;
      const pr = document.getElementById('feedback-portal-root');
      if (!pr) return null;
      return createPortal(
        <div className={`md:hidden fixed bottom-0 left-0 right-0 z-[99999] p-4 pb-8 rounded-t-2xl shadow-[0_-8px_40px_rgba(0,0,0,0.3)] border-t transition-transform duration-300 animate-slide-up-bounce bg-white ${feedback.type === 'success' ? 'border-green-400 bg-green-50 ring-4 ring-green-100' : feedback.type === 'warning' ? 'border-yellow-300 bg-yellow-50' : feedback.type === 'error' ? 'border-red-300 bg-red-50' : 'border-blue-300 bg-blue-50'}`}>
          <div className="flex items-center justify-between gap-2 mb-2">
            <div className="flex items-center gap-2 overflow-hidden">
              {feedback.type === 'success' && <Check className="w-6 h-6 text-green-600 flex-shrink-0 animate-bounce" />}
              {feedback.type === 'warning' && <AlertCircle className="w-6 h-6 text-yellow-600 flex-shrink-0" />}
              {feedback.type === 'error' && <X className="w-6 h-6 text-red-600 flex-shrink-0" />}
              <span className={`font-bold text-lg truncate ${feedback.type === 'success' ? 'text-green-800' : 'text-slate-800'}`}>
                {feedback.text} {feedback.score !== undefined && `(${feedback.score}%)`}
              </span>
            </div>
            <div className="flex gap-2 flex-shrink-0">
              {feedback.spokenText && (
                <button onClick={toggleDetails} className="px-4 py-2 bg-white rounded-full text-sm font-bold shadow-sm border border-gray-100 active:bg-gray-100 transition-all text-slate-700">
                  {showDetails ? '隱藏' : '詳情'}
                </button>
              )}
              <button onClick={onClose} className="w-9 h-9 flex items-center justify-center bg-white rounded-full text-gray-400 hover:text-red-500 shadow-sm border border-gray-100 active:bg-gray-100 transition-all">
                <X className="w-5 h-5" />
              </button>
            </div>
          </div>
          {showDetails && (
            <div className="max-h-[50vh] overflow-y-auto overscroll-contain pb-2 mt-3 bg-white/50 rounded-xl p-2 animate-fade-in">
              <RenderComparison feedback={feedback} />
            </div>
          )}
        </div>, pr
      );
    };

    const VoiceEvaluatorButton = ({ id, status, feedback, showDetails, toggleDetails, onRecord }) => {
      let bc = "bg-white text-gray-500 border-gray-200 hover:bg-gray-50 hover:text-blue-600";
      let ic = <Mic className="w-5 h-5" />;
      if (status === 'init') {
        bc = "bg-yellow-100 text-yellow-600 border-yellow-300";
        ic = <Loader2 className="w-5 h-5 animate-spin-slow" />;
      } else if (status === 'listening') {
        bc = "bg-red-500 text-white border-red-500 animate-pulse-ring";
        ic = <div className="text-xs font-bold font-sans">GO!</div>;
      }
      return (
        <div className="relative inline-block ml-2 text-left">
          <button onClick={(e) => { e.stopPropagation(); onRecord(id); }} className={`flex items-center justify-center w-10 h-10 rounded-full border shadow-sm transition-all ${bc}`} title="點擊開始錄音">
            {ic}
          </button>
          {status === 'init' && <div className="absolute top-full left-1/2 -translate-x-1/2 mt-1 text-[10px] text-yellow-600 font-bold whitespace-nowrap z-50">準備中...</div>}
          {feedback && (
            <div className={`hidden md:block absolute bottom-full right-0 mb-2 p-3 rounded-lg text-sm font-bold whitespace-normal min-w-[300px] z-50 shadow-xl border animate-fade-in ${feedback.type === 'success' ? 'bg-green-50 text-green-800 border-green-200' : feedback.type === 'warning' ? 'bg-yellow-50 text-yellow-800 border-yellow-200' : feedback.type === 'error' ? 'bg-red-50 text-red-800 border-red-200' : 'bg-blue-50 text-blue-800 border-blue-200'}`}>
              <div className="flex items-center justify-between gap-2">
                <div className="flex items-center gap-2">
                  {feedback.type === 'success' && <Check className="w-4 h-4 text-green-600" />}
                  {feedback.type === 'warning' && <AlertCircle className="w-4 h-4 text-yellow-600" />}
                  {feedback.type === 'error' && <X className="w-4 h-4 text-red-600" />}
                  <span className="font-medium">{feedback.text} {feedback.score !== undefined && `(${feedback.score}%)`}</span>
                </div>
                {feedback.spokenText && (
                  <button onClick={(e) => { e.stopPropagation(); toggleDetails(); }} className="text-xs underline opacity-70 hover:opacity-100">
                    {showDetails ? '隱藏' : '詳情'}
                  </button>
                )}
              </div>
              {showDetails && <RenderComparison feedback={feedback} />}
            </div>
          )}
        </div>
      );
    };

    const CIACard = ({ drill, onRecord, recState }) => {
      const [isActive, setIsActive] = useState(false);
      const [selections, setSelections] = useState({});
      const [isAudioPlaying, setIsAudioPlaying] = useState(false);

      const handleActivate = () => {
        if (!isActive) {
          setIsAudioPlaying(true);
          speakText(drill.plain, 0.85, () => {
            setIsAudioPlaying(false);
            setIsActive(true);
          });
        }
      };

      const toggleSelection = (partId, options) => {
        setSelections(prev => {
          const currentIdx = prev[partId] !== undefined ? prev[partId] : 0;
          return { ...prev, [partId]: (currentIdx + 1) % options.length };
        });
      };

      const currentSentence = drill.parts.map(p => {
        if (p.type === 'fixed') return p.text;
        const selIdx = selections[p.id] || 0;
        return p.options[selIdx].en;
      }).join('');

      return (
        <div className={`bg-white rounded-2xl border-2 transition-all duration-500 overflow-hidden shadow-sm hover:shadow-md ${isActive ? 'border-indigo-400 ring-4 ring-indigo-50' : 'border-gray-200 cursor-pointer'}`} onClick={!isActive ? handleActivate : undefined}>
          <div className="p-6 flex items-center justify-between">
            <div>
              <span className="inline-block px-3 py-1 bg-indigo-100 text-indigo-700 text-xs font-bold rounded-full mb-3 uppercase tracking-wider"><Crosshair className="w-3 h-3 inline mr-1 -mt-0.5"/>CIA Pattern Drill</span>
              <h3 className="text-xl font-serif-en text-gray-800 font-bold mb-1">{drill.plain}</h3>
              <p className="text-gray-500 text-sm">{drill.chinese}</p>
            </div>
            {!isActive && (
              <button className={`w-12 h-12 rounded-full flex items-center justify-center text-white shadow-md transition-all ${isAudioPlaying ? 'bg-indigo-400 animate-pulse-ring' : 'bg-indigo-600 hover:scale-110'}`}>
                {isAudioPlaying ? <Volume2 className="w-6 h-6 animate-pulse"/> : <Play className="w-6 h-6 ml-1"/>}
              </button>
            )}
          </div>

          {isActive && (
            <div className="bg-indigo-50/50 p-6 border-t border-indigo-100 animate-fade-in">
              <div className="mb-4 text-sm text-indigo-800 font-medium flex items-center bg-indigo-100/50 inline-block px-3 py-1.5 rounded-lg">
                <Lightbulb className="w-4 h-4 mr-2"/>教練提示：點擊虛線框替換情境詞彙，組合出您的專屬句子後按下麥克風！
              </div>
              
              <div className="text-2xl font-serif-en leading-loose text-gray-800 mb-8 flex flex-wrap items-center">
                {drill.parts.map((p, i) => {
                  if (p.type === 'fixed') return <span key={i} className="mr-1">{p.text}</span>;
                  const selIdx = selections[p.id] || 0;
                  const currentOpt = p.options[selIdx];
                  return (
                    <button key={i} onClick={(e) => { e.stopPropagation(); toggleSelection(p.id, p.options); }} className="cia-variable-btn mx-1 px-3 py-1.5 bg-white border-2 border-dashed border-indigo-400 rounded-lg hover:bg-indigo-50 shadow-sm relative group inline-flex flex-col items-center justify-center align-middle min-w-[80px] h-auto">
                      <span className="text-indigo-700 font-bold leading-tight">{currentOpt.en}</span>
                      <span className="text-gray-400 text-[12px] font-normal leading-tight mt-0.5">{currentOpt.zh}</span>
                      <span className="absolute -top-3 -right-2 bg-indigo-600 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow-sm">換</span>
                    </button>
                  );
                })}
              </div>

              <div className="flex justify-end items-center gap-4">
                <button onClick={(e) => { e.stopPropagation(); speakText(currentSentence); }} className="flex items-center text-gray-500 hover:text-indigo-600 text-sm font-bold bg-white px-4 py-2 border border-gray-200 rounded-full shadow-sm transition-all hover:border-indigo-300">
                  <Volume2 className="w-4 h-4 mr-2"/>教練示範
                </button>
                <button onClick={(e) => { e.stopPropagation(); onRecord(drill.id, currentSentence); }} className={`flex items-center text-white text-base font-bold px-6 py-3 rounded-full shadow-lg transition-all ${recState.activeId === drill.id && recState.status === 'listening' ? 'bg-red-500 animate-pulse-ring' : 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:shadow-xl hover:-translate-y-1'}`}>
                  {recState.activeId === drill.id && recState.status === 'listening' ? (
                    <><div className="flex items-center gap-1 mr-2"><div className="wave-bar"/><div className="wave-bar"/><div className="wave-bar"/></div> 錄音中...</>
                  ) : (
                    <><Mic className="w-5 h-5 mr-2"/> 開口練習</>
                  )}
                </button>
              </div>

              {recState.feedbackMap[drill.id] && (
                <div className={`mt-6 p-4 rounded-xl border ${recState.feedbackMap[drill.id].type === 'success' ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-200'} animate-fade-in`}>
                  <div className="flex items-center gap-2 mb-2 font-bold">
                    {recState.feedbackMap[drill.id].type === 'success' ? <Check className="w-5 h-5 text-green-600"/> : <Zap className="w-5 h-5 text-yellow-600"/>}
                    <span className={recState.feedbackMap[drill.id].type === 'success' ? 'text-green-800' : 'text-yellow-800'}>
                      {recState.feedbackMap[drill.id].text} ({recState.feedbackMap[drill.id].score}%)
                    </span>
                  </div>
                  <div className="text-sm text-gray-600 bg-white p-3 rounded-lg border border-gray-100 shadow-inner mt-2">
                    <span className="text-gray-400 block mb-1 text-xs">AI 聽到的是：</span>
                    <i className="text-gray-800 font-serif-en">{recState.feedbackMap[drill.id].spokenText}</i>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    const StartScreen = ({ onStart }) => (
      <div className="fixed inset-0 z-[9999] bg-slate-900 flex flex-col overflow-y-auto">
        <div className="min-h-full flex flex-col items-center justify-center p-4">
          <div className="max-w-md w-full bg-slate-800 rounded-3xl p-6 md:p-8 shadow-2xl border border-slate-700 text-center relative overflow-hidden my-auto">
            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div>
            <div className="w-16 h-16 md:w-20 md:h-20 bg-slate-700 rounded-full flex items-center justify-center mx-auto mb-4 md:mb-6 text-blue-400 ring-4 ring-slate-600/50">
              <Mic className="w-8 h-8" />
            </div>
            <h1 className="text-2xl md:text-3xl font-bold mb-3 tracking-tight text-white">商務英語會話特訓</h1>
            <p className="text-slate-400 mb-6 text-sm leading-relaxed">
              為了確保最佳的練習體驗，我們需要先取得您的麥克風權限。<br/><br/>
              <span className="text-blue-300 font-medium bg-blue-900/30 px-2 py-1 rounded">點擊一次允許，全程無縫練習</span>
            </p>
            <button onClick={onStart} className="group w-full relative inline-flex items-center justify-center px-6 py-3 md:px-8 md:py-4 text-base md:text-lg font-bold text-white transition-all duration-200 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl shadow-lg hover:shadow-blue-500/30 active:scale-95">
              <span>開啟麥克風並開始</span>
            </button>
          </div>
        </div>
      </div>
    );

    const App = () => {
      const [hasStarted, setHasStarted] = useState(false);
      const [activeTab, setActiveTab] = useState('cia');
      const [selectedUnitId, setSelectedUnitId] = useState(window.lecturesData[0].unitId);
      const [recState, setRecState] = useState({ activeId: null, status: 'idle', feedbackMap: {} });
      const [isBlindMode, setIsBlindMode] = useState(false);
      const [showDetailsMap, setShowDetailsMap] = useState({});

      const handleStartApp = async () => {
        const r = getSharedRecognition();
        if (r) {
          try { r.start(); setTimeout(() => { r.stop(); setHasStarted(true); }, 100); } 
          catch (e) { setHasStarted(true); }
        } else {
          alert("瀏覽器不支援語音"); setHasStarted(true);
        }
      };

      const currentUnit = useMemo(() => window.lecturesData.find(u => u.unitId === selectedUnitId) || window.lecturesData[0], [selectedUnitId]);

      const handleRecord = (id, targetText) => {
        if (recState.activeId === id && recState.status === 'listening') {
           setRecState(p => ({ ...p, status: 'idle', activeId: null }));
           if (globalRecognition) { try { globalRecognition.stop(); } catch(e){} }
           return;
        }
        const r = getSharedRecognition();
        if (!r) return;
        
        setRecState(p => ({ ...p, activeId: id, status: 'listening', feedbackMap: { ...p.feedbackMap, [id]: null } }));
        setShowDetailsMap(p => ({ ...p, [id]: false }));
        
        r.onresult = (e) => {
          const sp = e.results[0][0].transcript;
          const tc = cleanText(targetText); const sc = cleanText(sp);
          const tw = tc.split(' '); const sw = sc.split(' ');
          let mc = 0;
          tw.forEach(w => { if (sw.some(x => x === w || (x.length > 3 && (x.includes(w) || w.includes(x))))) mc++; });
          let acc = tw.length > 0 ? Math.round((mc / tw.length) * 100) : 0;
          if (tw.length <= 3 && sc === tc) acc = 100;
          
          let ft = acc >= 90 ? 'success' : 'warning';
          let fm = acc >= 90 ? '完美發音！' : '很棒！再注意一下連音會更好。';
          if (acc < 60) { ft = 'error'; fm = '請再試一次！'; }
          
          setRecState(p => ({ ...p, status: 'idle', feedbackMap: { ...p.feedbackMap, [id]: { type: ft, text: fm, score: acc, spokenText: sp, targetText: targetText } } }));
          setShowDetailsMap(p => ({ ...p, [id]: true }));
        };
        r.onend = () => setRecState(p => { if(p.activeId === id) return {...p, status: 'idle'}; return p; });
        try { r.start(); } catch(e) { try { r.stop(); setTimeout(()=>r.start(),100); } catch(er){} }
      };

      const toggleDetails = (id) => { setShowDetailsMap(p => ({ ...p, [id]: !p[id] })); };
      const closeActiveFeedback = () => { if (recState.activeId) { setRecState(p => ({ ...p, feedbackMap: { ...p.feedbackMap, [p.activeId]: null } })); } };

      const th = currentUnit.themeColor;

      if (!hasStarted) return <StartScreen onStart={handleStartApp} />;

      const activeFeedback = recState.activeId ? recState.feedbackMap[recState.activeId] : null;
      const isShowDetails = recState.activeId ? showDetailsMap[recState.activeId] : false;

      return (
        <div className="max-w-4xl mx-auto px-4 py-8 pb-24 min-h-screen animate-fade-in">
          <header className="mb-8">
            <div className="flex items-center gap-3 mb-2">
              <div className={`p-2 bg-${th}-100 text-${th}-600 rounded-xl`}><Target className="w-6 h-6"/></div>
              <h1 className="text-3xl font-bold text-gray-800 tracking-tight">商務英語會話大腦</h1>
            </div>
            <p className="text-gray-500 font-medium pl-11">NLP 認知學習法・V5 終極完整版</p>
          </header>

          <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-8 flex flex-col sm:flex-row items-start sm:items-center gap-4">
            <div className="flex items-center gap-2 text-gray-600 font-bold min-w-max">
              <Filter className="w-5 h-5"/> 選擇特訓單元：
            </div>
            <div className="flex gap-2 overflow-x-auto pb-2 sm:pb-0 w-full hide-scrollbar">
              {window.lecturesData.map(u => (
                <button key={u.unitId} onClick={() => setSelectedUnitId(u.unitId)} className={`px-5 py-2.5 rounded-xl font-bold text-sm transition-all whitespace-nowrap flex-shrink-0 ${selectedUnitId === u.unitId ? `bg-${u.themeColor}-600 text-white shadow-md transform scale-105` : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`}>
                  {u.unitId}
                </button>
              ))}
            </div>
          </div>

          <div className={`bg-gradient-to-br from-${th}-50 to-white p-6 rounded-2xl shadow-sm border border-${th}-100 mb-8`}>
            <h2 className={`text-lg font-bold text-${th}-800 mb-4 flex items-center`}><Target className="w-5 h-5 mr-2"/> {currentUnit.title} - 本課目標</h2>
            <ul className="space-y-2 mb-4">
              {currentUnit.objectives.map((obj, i) => (
                <li key={i} className="flex items-start text-gray-700 text-sm font-medium"><Check className={`w-4 h-4 mr-2 text-${th}-500 flex-shrink-0 mt-0.5`}/> {obj}</li>
              ))}
            </ul>
            <div className={`bg-${th}-100/50 p-3 rounded-lg flex items-start text-sm text-${th}-800 font-medium border border-${th}-200/50`}>
              <Zap className={`w-4 h-4 mr-2 text-${th}-600 mt-0.5 flex-shrink-0`}/> 
              <span><strong>發音心法：</strong>{currentUnit.pronunciation}</span>
            </div>
          </div>

          <div className="flex gap-2 mb-6 overflow-x-auto pb-2 hide-scrollbar">
            <button onClick={() => setActiveTab('cia')} className={`px-6 py-3 rounded-full text-sm font-bold flex items-center transition-all ${activeTab === 'cia' ? 'bg-gray-800 text-white shadow-md' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`}><Crosshair className="w-4 h-4 mr-2"/>CIA 實戰特訓</button>
            <button onClick={() => setActiveTab('sentences')} className={`px-6 py-3 rounded-full text-sm font-bold flex items-center transition-all ${activeTab === 'sentences' ? 'bg-gray-800 text-white shadow-md' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`}><MessageCircle className="w-4 h-4 mr-2"/>情境句型</button>
            <button onClick={() => setActiveTab('vocab')} className={`px-6 py-3 rounded-full text-sm font-bold flex items-center transition-all ${activeTab === 'vocab' ? 'bg-gray-800 text-white shadow-md' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`}><BookOpen className="w-4 h-4 mr-2"/>關鍵單字</button>
            <button onClick={() => setActiveTab('prep')} className={`px-6 py-3 rounded-full text-sm font-bold flex items-center transition-all ${activeTab === 'prep' ? 'bg-gray-800 text-white shadow-md' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`}><Link2 className="w-4 h-4 mr-2"/>介係詞用法</button>
          </div>

          <div className="animate-fade-in">
            {activeTab === 'cia' && (
              <div className="space-y-6">
                <div className="bg-gray-800 text-white p-4 rounded-xl flex items-start gap-3 shadow-md">
                  <Lightbulb className="w-6 h-6 text-yellow-400 flex-shrink-0"/>
                  <div className="text-sm leading-relaxed">
                    <strong className="text-yellow-400 text-base block mb-1">給慧楨的 NLP 特訓指南：</strong>
                    點擊下方卡片，系統會<span className="text-blue-300 font-bold">先播放一次標準發音</span>。等您的大腦建立安全感後再展開互動，點擊虛線單字替換情境，最後按下麥克風大聲說出來！
                  </div>
                </div>
                {currentUnit.ciaDrills.map((drill) => (
                  <CIACard key={drill.id} drill={drill} onRecord={handleRecord} recState={recState} />
                ))}
              </div>
            )}

            {activeTab === 'sentences' && (
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div className="p-4 border-b border-gray-50 bg-gray-50/50 flex justify-end">
                   <button onClick={() => setIsBlindMode(!isBlindMode)} className={`px-4 py-2 rounded-full text-xs font-bold transition-all flex items-center ${isBlindMode ? 'bg-gray-800 text-white' : 'bg-white text-gray-600 border border-gray-200 shadow-sm'}`}>
                    {isBlindMode ? <EyeOff className="w-3 h-3 mr-1" /> : <Eye className="w-3 h-3 mr-1" />} {isBlindMode ? '盲聽模式 ON' : '遮蔽英文'}
                  </button>
                </div>
                <div className="divide-y divide-gray-50">
                  {currentUnit.sentences.map((it) => (
                    <div key={it.id} className="p-6 hover:bg-gray-50 transition-colors group">
                      <div className="flex flex-col md:flex-row md:items-start justify-between gap-4">
                        <div className="flex-1">
                          <div className="text-xl md:text-2xl text-gray-800 font-serif-en mb-3 leading-relaxed">
                            <InteractiveSentence htmlContent={it.text} isBlindMode={isBlindMode} />
                          </div>
                          <p className="text-gray-600 font-medium text-sm mb-3">{it.mean}</p>
                          <div className="inline-flex items-start text-xs text-gray-500 bg-gray-100 px-3 py-2 rounded-lg w-full md:w-auto">
                            <Info className="w-4 h-4 mr-2 mt-0.5 text-gray-400 flex-shrink-0" />
                            <div className="flex-1"><SmartTip text={it.tip} /></div>
                          </div>
                        </div>
                        <div className="flex items-center space-x-2 flex-shrink-0 opacity-80 group-hover:opacity-100 transition-opacity mt-4 md:mt-0 self-end md:self-center">
                          <VoiceEvaluatorButton id={it.id} status={recState.activeId === it.id ? recState.status : 'idle'} feedback={recState.feedbackMap[it.id]} showDetails={showDetailsMap[it.id]} toggleDetails={() => toggleDetails(it.id)} onRecord={() => handleRecord(it.id, it.plain)} />
                          <button onClick={(e) => { e.stopPropagation(); speakText(it.plain, 0.75); }} className="flex items-center justify-center h-10 px-3 rounded-full bg-white border border-gray-200 text-green-600 hover:bg-green-50 hover:border-green-200 hover:scale-105 transition-all shadow-sm text-xs font-bold" title="慢速"><Turtle className="w-4 h-4 mr-1" /> 0.75x</button>
                          <button onClick={(e) => { e.stopPropagation(); speakText(it.plain, 1.0); }} className={`flex items-center justify-center h-10 px-3 rounded-full text-white shadow-sm transition-transform hover:scale-105 bg-${currentUnit.themeColor}-500 text-xs font-bold`}><Play className="w-4 h-4 mr-1"/> 1.0x</button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'vocab' && (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {currentUnit.vocab.map((w, wi) => (
                  <div key={wi} onClick={() => speakText(w.word)} className={`bg-white border border-${currentUnit.themeColor}-100 p-5 rounded-xl shadow-sm hover:shadow-md transition-all cursor-pointer group flex flex-col`}>
                    <div className="flex justify-between items-start mb-2">
                      <h3 className="text-xl font-bold text-gray-800">{w.word}</h3>
                      <Volume2 className={`w-5 h-5 text-${currentUnit.themeColor}-300 group-hover:text-${currentUnit.themeColor}-600`} />
                    </div>
                    <div className="text-sm font-bold text-gray-500 mb-3">{w.kk} • {w.mean}</div>
                    <div className={`text-xs text-${currentUnit.themeColor}-800 bg-${currentUnit.themeColor}-50 p-2 rounded flex items-start mt-auto`}>
                       <Lightbulb className="w-4 h-4 mr-1.5 mt-0.5 flex-shrink-0"/>
                       <div className="flex-1"><SmartTip text={w.tip} /></div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'prep' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {window.prepData.map((it) => (
                  <div key={it.id} onClick={() => speakText(it.plain)} className="bg-white rounded-xl shadow-sm border border-orange-100 p-5 hover:shadow-md transition-all cursor-pointer group flex flex-col">
                    <div className="flex justify-between items-start mb-3">
                      <span className="inline-block px-3 py-1 bg-orange-100 text-orange-700 text-sm font-bold rounded-full">{it.phrase}</span>
                      <div className="flex items-center gap-2">
                        <VoiceEvaluatorButton id={it.id} status={recState.activeId === it.id ? recState.status : 'idle'} feedback={recState.feedbackMap[it.id]} showDetails={showDetailsMap[it.id]} toggleDetails={() => toggleDetails(it.id)} onRecord={() => handleRecord(it.id, it.plain)} />
                        <Volume2 className="w-5 h-5 text-gray-300 group-hover:text-orange-500 transition-colors" />
                      </div>
                    </div>
                    <div className="mb-4 flex-grow">
                      <h3 className="text-lg md:text-xl text-gray-800 font-serif-en mb-2"><InteractiveSentence htmlContent={it.sentence} isBlindMode={false} /></h3>
                      <p className="text-gray-500 text-sm font-medium">{it.mean}</p>
                    </div>
                    <div className="mt-auto pt-3 border-t border-gray-50">
                      <div className="text-xs text-orange-600 bg-orange-50 p-2 rounded-lg flex items-start">
                        <Zap className="w-4 h-4 mr-1.5 mt-0.5 flex-shrink-0"/>
                        <div className="flex-1"><SmartTip text={it.tip} /></div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
          <MobileFeedbackToast feedback={activeFeedback} showDetails={isShowDetails} toggleDetails={() => toggleDetails(recState.activeId)} onClose={closeActiveFeedback} />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
